name: sfwf
description: "Smart Flutter Web Framework - SEO, SSR, pre-rendering, AI optimization for Flutter. Works on all platforms."
version: 1.0.0
homepage: https://sfwf.dev
repository: https://github.com/BahyOsama/sfwf
issue_tracker: https://github.com/BahyOsama/sfwf/issues

environment:
  sdk: '>=2.19.0 <4.0.0'
  flutter: '>=3.7.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.6.0
  xml: ^6.6.1
  riverpod: ^3.2.1
  args: ^2.7.0
  meta: ^1.17.0
  path: ^1.9.1
  universal_html: ^2.3.0
  puppeteer: ^3.22.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  image: ^4.1.3
  crypto: ^3.0.3
  mime: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.22.0
  build_runner: ^2.13.1
  #hive_generator: ^2.0.0


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  plugin:
    platforms:
      web:
        pluginClass: SfwfWeb
        fileName: sfwf_web.dart
  assets:
    - assets/default-og.png

executables:
  sfwf: sfwf
  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images
platforms:
  web:
  ios:
  android:
  windows:
  linux:
  macos:
  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
