name: sfwf
description: "Smart Flutter Web Framework v2.0 - SEO, SSR, pre-rendering, AI optimization for Flutter. The ultimate platform for building production-grade web apps with Flutter."
version: 2.0.0
homepage: https://sfwf.dev
repository: https://github.com/BahyOsama/sfwf
issue_tracker: https://github.com/BahyOsama/sfwf/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.6.0
  xml: ^6.6.1
  riverpod: ^3.2.1
  args: ^2.7.0
  meta: ^1.17.0
  path: ^1.9.1
  universal_html: ^2.3.0
  puppeteer: ^3.22.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  image: ^4.1.3
  crypto: ^3.0.3
  mime: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.22.0
  build_runner: ^2.13.1

flutter:
  uses-material-design: true
  plugin:
    platforms:
      web:
        pluginClass: SfwfWeb
        fileName: sfwf_web.dart
  assets:
    - assets/default-og.png

executables:
  sfwf: sfwf

platforms:
  web:
  ios:
  android:
  windows:
  linux:
  macos:
