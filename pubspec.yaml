name: sfwf
description: "Smart Flutter Web Framework v2.0 - SEO, SSR, pre-rendering, AI optimization for Flutter. The ultimate platform for building production-grade web apps with Flutter."
version: 2.0.8
homepage: https://pub.dev/packages/sfwf
repository: https://github.com/BahyOsama/sfwf
issue_tracker: https://github.com/BahyOsama/sfwf/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  hive: '>=2.0.0 <3.0.0'
  hive_flutter: '>=1.0.0 <2.0.0'
  http: '>=0.13.0 <2.0.0'
  xml: '>=6.0.0 <8.0.0'
  riverpod: ^3.2.1
  args: ^2.7.0
  meta: '>=1.8.0 <3.0.0'
  path: '>=1.8.0 <2.0.0'
  web: ^1.0.0
  puppeteer: '>=3.0.0 <4.0.0'
  shelf: '>=1.0.0 <2.0.0'
  shelf_router: '>=1.0.0 <2.0.0'
  image: '>=3.0.0 <5.0.0'
  crypto: '>=3.0.0 <4.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.22.0
  build_runner: ^2.13.1

flutter:
  uses-material-design: true
  plugin:
    platforms:
      web:
        pluginClass: SfwfWeb
        fileName: sfwf_web.dart
  assets:
    - assets/default-og.png

executables:
  sfwf: sfwf

platforms:
  web:
  ios:
  android:
  windows:
  linux:
  macos:
